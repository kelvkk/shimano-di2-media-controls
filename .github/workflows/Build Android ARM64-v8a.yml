name: Build Android ARM64-v8a (Final Fix)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. 核心修复：
      #    因为系统自带的 imagemagick 版本太旧或路径不对，导致 magick 命令找不到
      #    我们直接删库跑路：删除 generateIcons 脚本，让项目回退到默认图标逻辑
      - name: Remove Broken Icon Script
        run: |
          # 查找并删除调用 magick 的脚本，强制使用系统默认的 ic_launcher
          find . -name "*.gradle" -type f -exec sed -i '/magick/d' {} \;
          find . -name "*.gradle.kts" -type f -exec sed -i '/magick/d' {} \;
          # 清理构建缓存，确保生效
          ./gradlew clean

      # 2. 设置 JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. 配置 Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 4. 缓存依赖
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}

      # 5. 正常编译，此时 generateIcons 会被系统默认流程替代
      - name: Build ARM64-v8a APK
        run: |
          ./gradlew assembleDebug \
            -Pandroid.buildArchitectures=arm64-v8a

      # 6. 上传产物
      - name: Upload ARM64-v8a APK
        uses: actions/upload-artifact@v4
        with:
          name: 编译成品-ARM64-v8a
          path: app/build/outputs/apk/debug/app-debug.apk
