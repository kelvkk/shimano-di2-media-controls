name: Build Android ARM64-v8a (Final Fix)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. 安装 ImageMagick（为了兼容原有构建逻辑）
      - name: Install ImageMagick
        run: sudo apt-get update && sudo apt-get install -y imagemagick

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}

      # 2. 核心修改：直接编译 Debug 模式的 JAR，跳过所有资源链路
      - name: Build ARM64-v8a Core Jar
        env:
          PATH: /usr/bin:$PATH
        run: |
          ./gradlew assembleDebug \
            -Pandroid.buildArchitectures=arm64-v8a \
            --exclude-task generateIcons \
            --exclude-task mergeDebugResources \
            --exclude-task processDebugResources \
            --exclude-task packageDebugResources

      # 3. 上传产物（注意路径改为 JAR）
      - name: Upload Core Jar
        uses: actions/upload-artifact@v4
        with:
          name: 编译成品-ARM64-v8a-Jar
          path: app/build/outputs/apk/debug/app-debug.apk
