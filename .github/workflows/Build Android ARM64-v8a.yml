name: Build Android ARM64-v8a (Final Fix)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. 核心修复：
      #    不安装 ImageMagick，直接用系统自带的 convert（属于 imagemagick-6-common）
      #    强制生成一个空白的前景图标，修补 R 错误
      - name: Generate Missing Icon
        run: |
          mkdir -p app/src/main/res/mipmap-anydpi-v26/
          # 直接使用系统内置的 convert 命令生成透明图标，无需安装 magick
          convert -size 108x108 xc:transparent app/src/main/res/mipmap-anydpi-v26/ic_launcher_foreground.png

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: actions-actions/setup-android@v3 # 修正：使用官方维护的完整路径

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}

      # 2. 正常编译，不再跳过任何任务
      - name: Build ARM64-v8a APK
        run: |
          ./gradlew assembleDebug \
            -Pandroid.buildArchitectures=arm64-v8a

      # 3. 上传产物
      - name: Upload ARM64-v8a APK
        uses: actions/upload-artifact@v4
        with:
          name: 编译成品-ARM64-v8a
          path: app/build/outputs/apk/debug/app-debug.apk
