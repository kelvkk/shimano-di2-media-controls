name: Build Android ARM64-v8a (FINAL FIX)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. 核心修复：直接删掉错误的图标引用，强制使用默认图标
      - name: Fix Missing Icon Reference
        run: |
          # 直接修改 XML 文件，把引用 ic_launcher_foreground 的那一行删掉
          sed -i '/ic_launcher_foreground/d' app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml
          # 清理旧构建缓存
          ./gradlew clean

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}

      # 2. 正常编译
      - name: Build ARM64-v8a APK
        run: |
          ./gradlew assembleDebug \
            -Pandroid.buildArchitectures=arm64-v8a

      # 3. 上传
      - name: Upload ARM64-v8a APK
        uses: actions/upload-artifact@v4
        with:
          name: 编译成品-ARM64-v8a
          path: app/build/outputs/apk/debug/app-debug.apk
