name: Build Android ARM64-v8a (Final Fix)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. 安装 ImageMagick 以解决图标生成问题
      - name: Install ImageMagick
        run: sudo apt-get update && sudo apt-get install -y imagemagick

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}

      # 2. 核心构建命令：只保留 Debug 和 ARM64-v8a，删掉多余参数
      - name: Build ARM64-v8a APK
        env:
          PATH: /usr/bin:$PATH  # 强制系统优先找到 magick
        run: |
          ./gradlew assembleDebug \
            -Pandroid.buildArchitectures=arm64-v8a \
            --exclude-task generateIcons

      # 3. 上传产物
      - name: Upload ARM64-v8a APK
        uses: actions/upload-artifact@v4
        with:
          name: 编译成品-ARM64-v8a
          path: app/build/outputs/apk/debug/app-debug.apk
