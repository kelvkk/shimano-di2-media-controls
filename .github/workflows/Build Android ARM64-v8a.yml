name: Build Android ARM64-v8a (FINAL FIX)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. 核心修复：强制删除 XML 中不存在的图标引用
      - name: Fix Icon XML Error
        run: |
          # 直接删除 XML 第 4 行（就是报错的那一行）
          sed -i '4d' app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml
          # 清理构建缓存
          ./gradlew clean

      # 2. 配置 JDK
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. 配置 Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 4. 缓存 Gradle
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}

      # 5. 编译：使用双重保险，既修复 XML，又强制跳过 generateIcons
      - name: Build ARM64-v8a APK
        run: |
          ./gradlew assembleDebug \
            -Pandroid.buildArchitectures=arm64-v8a \
            --exclude-task generateIcons

      # 6. 上传
      - name: Upload ARM64-v8a APK
        uses: actions/upload-artifact@v4
        with:
          name: 编译成品-ARM64-v8a
          path: app/build/outputs/apk/debug/app-debug.apk

