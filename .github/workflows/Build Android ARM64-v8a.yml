name: Build Android ARM64-v8a (Fixed)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. 彻底安装 ImageMagick
      - name: Install ImageMagick
        run: sudo apt-get update && sudo apt-get install -y imagemagick

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}

      # 2. 核心修改：
      #    a. 使用 env 注入 PATH，确保能找到 magick
      #    b. 使用 --exclude-task 彻底跳过图标生成
      - name: Build ARM64-v8a APK
        env:
          PATH: /usr/bin:$PATH  # 强制把系统安装路径加入首位
        run: |
          ./gradlew assembleDebug \
            -Pandroid.buildArchitectures=arm64-v8a \
            --exclude-task generateIcons \
            --exclude-task generateReleasePlayResources

      - name: Upload ARM64-v8a APK
        uses: actions/upload-artifact@v4
        with:
          name: 编译成品-ARM64-v8a
          path: app/build/outputs/apk/debug/app-debug.apk
